# ==================== 服务器配置 ====================
# 端口号：项目启动后访问 http://localhost:8080
server.port=8080

# ==================== 应用名称 ====================
spring.application.name=resume-backend

# ==================== 日志配置 ====================
# 设置日志级别为INFO，让控制台输出关键信息但不太啰嗦
logging.level.com.resume=INFO

